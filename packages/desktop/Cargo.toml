[package]
name = "fastboop-desktop"
version.workspace = true
edition = "2021"
license.workspace = true
publish = false

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
dioxus = { workspace = true, features = ["router"] }
ui = { workspace = true }
fastboop-core = { workspace = true }
fastboop-environment-std = { workspace = true }
fastboop-fastboot-rusb = { path = "../../crates/fastboop-fastboot-rusb" }
gobblytes-core = { workspace = true }
gobblytes-erofs = { workspace = true }
gobblytes-fat = { workspace = true }
gibblox-core = { workspace = true, features = ["std"] }
gibblox-ext4 = { workspace = true }
gibblox-file = { workspace = true }
gibblox-http = { workspace = true, default-features = false, features = ["native-client"] }
gibblox-pipeline = { workspace = true, features = ["std"] }
gibblox-zip = { workspace = true, features = ["std"] }
rfd = "0.17.2"
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.20", features = ["env-filter"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "signal", "time"] }
tokio-util = { workspace = true }
url = { workspace = true }

[features]
default = ["desktop"]
desktop = ["dioxus/desktop"]
