[package]
name = "fastboop-web"
version.workspace = true
edition = "2021"
license.workspace = true
publish = false

[dependencies]
anyhow = { workspace = true }
dioxus = { workspace = true, features = ["router"] }
ui = { workspace = true }
fastboop-core = { path = "../../crates/fastboop-core" }
fastboop-environment-web = { workspace = true }
fastboop-session = { workspace = true }
fastboop-stage0-generator = { path = "../../crates/fastboop-stage0-generator" }
fastboop-fastboot-webusb = { path = "../../crates/fastboop-fastboot-webusb" }
gobblytes-erofs = { workspace = true }
gobblytes-core = { workspace = true }
gobblytes-fat = { workspace = true }
gibblox-core = { workspace = true }
gibblox-casync = { workspace = true }
gibblox-casync-web = { workspace = true }
gibblox-http = { workspace = true, default-features = false, features = ["wasm-client"] }
gibblox-ext4 = { workspace = true }
gibblox-cache = { workspace = true }
gibblox-cache-store-opfs = { workspace = true }
gibblox-pipeline = { workspace = true, features = ["web"] }
gibblox-zip = { workspace = true }
gibblox-blockreader-messageport = { workspace = true }
gibblox-web-worker = { workspace = true }
url = { workspace = true }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.20", default-features = false, features = ["fmt", "registry", "std"] }
tracing-wasm = "0.2.1"
futures-channel = { workspace = true }
futures-util = { workspace = true, features = ["alloc", "async-await"] }
gloo-timers = { version = "0.3.0", features = ["futures"] }
js-sys = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
console_error_panic_hook = "0.1.7"
web-sys = { workspace = true, features = ["DedicatedWorkerGlobalScope", "Document", "Event", "Headers", "HtmlCollection", "HtmlScriptElement", "MessageChannel", "MessageEvent", "MessagePort", "Navigator", "ReadableStream", "ReadableStreamDefaultReader", "Request", "RequestInit", "RequestMode", "Response", "Serial", "SerialOptions", "SerialPort", "SerialPortFilter", "SerialPortInfo", "SerialPortRequestOptions", "Usb", "UsbDevice", "UsbDeviceFilter", "UsbDeviceRequestOptions", "WakeLock", "WakeLockSentinel", "WakeLockType", "Window", "Worker", "WorkerGlobalScope", "WorkerNavigator", "WorkerOptions", "WorkerType"] }

[features]
default = ["web"]
web = ["dioxus/web"]
