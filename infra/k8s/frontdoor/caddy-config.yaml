apiVersion: v1
kind: ConfigMap
metadata:
  name: frontdoor-caddy
data:
  Caddyfile: |-
    {
      admin off
    }

    :8080 {
      respond /healthz "ok" 200
      respond "not found" 404
    }

    http://fastboop.win {
      @gha path /gha /gha/*
      handle @gha {
        reverse_proxy gha-proxy.fastboop.svc.cluster.local:80
      }

      @matrix_well_known path /.well-known/matrix /.well-known/matrix/*
      handle @matrix_well_known {
        reverse_proxy matrix-well-known.fastboop.svc.cluster.local:80
      }

      @device_permissions path /device-permissions /device-permissions/*
      handle @device_permissions {
        redir https://docs.fastboop.win/user/device-permissions/ 308
      }

      handle {
        redir https://www.fastboop.win{uri} 308
      }
    }

    http://www.fastboop.win {
      reverse_proxy fastboop-web.fastboop.svc.cluster.local:80
    }

    http://matrix.fastboop.win {
      reverse_proxy conduit-generic.fastboop.svc.cluster.local:80
    }
