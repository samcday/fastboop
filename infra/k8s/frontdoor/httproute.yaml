apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: public
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  hostnames:
    - fastboop.win
    - matrix.fastboop.win
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared
      namespace: kube-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontdoor
          port: 80
