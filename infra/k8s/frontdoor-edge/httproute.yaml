apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontdoor-edge
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  hostnames:
    - edge.fastboop.win
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared
      namespace: kube-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: runtime-gateway
          namespace: wasmcloud
          port: 80
