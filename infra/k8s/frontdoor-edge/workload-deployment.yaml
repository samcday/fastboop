apiVersion: runtime.wasmcloud.dev/v1alpha1
kind: WorkloadDeployment
metadata:
  name: frontdoor-edge
spec:
  replicas: 1
  template:
    spec:
      hostSelector:
        hostgroup: default
      components:
        - name: frontdoor-edge
          image: ghcr.io/samcday/fastboop-frontdoor-edge:1778041479 # {"$imagepolicy": "fastboop:frontdoor-edge"}
          localResources:
            environment:
              config:
                # Pin split workloads to their site instead of relying on
                # the Host value forwarded through the wasmCloud runtime.
                FRONTDOOR_DEV_SITE: web
              configFrom:
                - name: live-version
            allowedHosts:
              - github.com
              - objects.githubusercontent.com
              - release-assets.githubusercontent.com
            volumeMounts:
              - name: cache
                mountPath: /cache
      volumes:
        - name: cache
          ephemeral: {}
      hostInterfaces:
        - name: www
          namespace: wasi
          package: http
          interfaces:
            - incoming-handler
          config:
            host: www.fastboop.win
---
