apiVersion: runtime.wasmcloud.dev/v1alpha1
kind: WorkloadDeployment
metadata:
  name: frontdoor-edge
spec:
  replicas: 1
  template:
    spec:
      hostSelector:
        hostgroup: default
      components:
        - name: frontdoor-edge
          image: ghcr.io/samcday/fastboop-frontdoor-edge:latest # {"$imagepolicy": "fastboop:frontdoor-edge"}
      hostInterfaces:
        - namespace: wasi
          package: http
          interfaces:
            - incoming-handler
          config:
            host: edge.fastboop.win
