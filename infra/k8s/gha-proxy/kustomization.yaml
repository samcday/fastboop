apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: fastboop
resources:
  - deployment.yaml
  - github-token.yaml
  - service.yaml
  - vpa.yaml
configMapGenerator:
  - name: gha-proxy-config
    literals:
      - ALLOWLIST=pocketblue/pocketblue,samcday/rokkitpokkit
      - CACHE_DIR=/cache
      - CACHE_MAX_BYTES=32212254720
      - PORT=8080
      - REQUEST_TIMEOUT_SECONDS=300
  - name: gha-proxy-script
    files:
      - gha_proxy.py=gha_proxy.py
