id: shift-axolotl
display_name: SHIFT6mq
devicetree_name: qcom/sdm845-shift-axolotl

match:
  - fastboot:
      vid: 0x18d1
      pid: 0xd00d

probe:
  - fastboot.getvar: serialno
    starts_with: S6MQ
  - fastboot.getvar: product
    equals: sdm845

boot:
  fastboot_boot:
    android_bootimg:
      header_version: 2
      page_size: 4096
      kernel_offset: 0x00008000

      kernel:
        encoding: image.gz

stage0:
  inject_mac:
    bluetooth: qcom,wcn3990-bt
    wifi: qcom,wcn3990-wifi
  kernel_modules:
    - dwc3
    - dwc3-qcom-legacy
    - phy-qcom-qusb2
    - nvmem_qfprom
    - gcc-sdm845
    - qnoc-sdm845
