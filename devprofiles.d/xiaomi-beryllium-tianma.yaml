id: xiaomi-beryllium-tianma
display_name: Xiaomi POCO F1 (tianma panel)
devicetree_name: qcom/sdm845-xiaomi-beryllium-tianma

match:
  - fastboot:
      vid: 0x18d1
      pid: 0xd00d

probe:
  - fastboot.getvar: product
    equals: beryllium

boot:
  fastboot_boot:
    android_bootimg:
      header_version: 2
      page_size: 4096
      kernel_offset: 0x00008000

      kernel:
        encoding: image.gz
