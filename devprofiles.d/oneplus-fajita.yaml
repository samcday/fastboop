id: oneplus-fajita
display_name: OnePlus 6T
devicetree_name: qcom/sdm845-oneplus-fajita

match:
  - fastboot:
      vid: 0x18d1
      pid: 0xd00d

probe:
  - fastboot.getvar: product
    equals: sdm845
  - fastboot.getvar: partition-type:op2
    equals: raw

boot:
  fastboot_boot:
    android_bootimg:
      header_version: 2
      page_size: 4096
      kernel_offset: 0x00008000

      kernel:
        encoding: image.gz

stage0:
  inject_mac:
    bluetooth: qcom,wcn3990-bt
    wifi: qcom,wcn3990-wifi
  kernel_modules:
    # This is the core set for a working UDC.
    - dwc3
    - dwc3-qcom-legacy
    - phy-qcom-qusb2
    - nvmem_qfprom
    - gcc-sdm845
    - qnoc-sdm845
