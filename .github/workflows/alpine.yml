name: alpine

on:
  workflow_call:
    inputs:
      release_mode:
        description: Release mode from orchestrator
        required: false
        type: string
        default: none
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write

jobs:
  alpine:
    if: inputs.release_mode == 'pr' || inputs.release_mode == 'tag' || github.event_name != 'pull_request' || (contains(github.event.pull_request.labels.*.name, 'apks') && !startsWith(github.event.pull_request.head.ref || '', 'release/v'))
    runs-on: ubuntu-24.04${{ matrix.arch == 'aarch64' && '-arm' || '' }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Install stage0 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools linux-libc-dev

      - name: Set up musl kernel headers
        run: |
          set -euo pipefail
          sudo mkdir -p /usr/include/$(uname -m)-linux-musl
          sudo ln -sf /usr/include/linux /usr/include/$(uname -m)-linux-musl/linux
          sudo ln -sf /usr/include/asm-generic /usr/include/$(uname -m)-linux-musl/asm-generic
          if [ -d /usr/include/$(uname -m)-linux-gnu/asm ]; then
            sudo ln -sf /usr/include/$(uname -m)-linux-gnu/asm /usr/include/$(uname -m)-linux-musl/asm
          elif [ -d /usr/include/asm ]; then
            sudo ln -sf /usr/include/asm /usr/include/$(uname -m)-linux-musl/asm
          fi
          if [ ! -e /usr/include/asm ]; then
            sudo ln -sf /usr/include/asm-generic /usr/include/asm
          fi

      - name: Set up Rust for stage0
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-unknown-linux-musl

      - name: Build stage0 sidecar
        run: |
          set -euo pipefail
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS="-C target-feature=+crt-static"
          cargo build -p fastboop-stage0 --release --target aarch64-unknown-linux-musl --locked
          mkdir -p stage0-apk
          cp target/aarch64-unknown-linux-musl/release/fastboop-stage0 \
            stage0-apk/fastboop-stage0-aarch64-unknown-linux-musl
          file stage0-apk/fastboop-stage0-aarch64-unknown-linux-musl
          file stage0-apk/fastboop-stage0-aarch64-unknown-linux-musl \
            | grep -Eq 'statically linked|static-pie linked'

      - uses: samcday/setup-alpine@main
        id: alpine
        with:
          arch: ${{ matrix.arch }}
          branch: edge
          packages: alpine-sdk

      - name: configure abuild key + deps
        run: |
          abuild-keygen -a -n
          cp ~/.abuild/*.pub /etc/apk/keys/
          abuild -F deps
        shell: alpine.sh --root {0}

      - name: set git revision for prerelease builds
        if: github.event_name != 'workflow_call' || inputs.release_mode != 'tag'
        run: |
          sed -i -e "s/^_gitrev=main$/_gitrev=$GITHUB_SHA/" APKBUILD
        shell: alpine.sh --root {0}

      - name: release prep
        if: inputs.release_mode == 'tag'
        run: |
          sed -i -e 's/^\(pkgver=.*\)_git$/\1/' APKBUILD
          sed -i -e "s/^_gitrev=.*/_gitrev=${{ github.ref_name }}/" APKBUILD
        shell: alpine.sh --root {0}

      - name: build package
        run: |
          export FASTBOOP_STAGE0_PATH="$GITHUB_WORKSPACE/stage0-apk/fastboop-stage0-aarch64-unknown-linux-musl"
          export PACKAGER_PRIVKEY=$HOME/.abuild/key.rsa
          abuild -F checksum
          abuild -F -P /packages
          mv APKBUILD /packages
          chmod -R 777 /packages
          for f in /packages/fastboop/${{ matrix.arch }}/*.apk; do
            mv "$f" "${f%.apk}-${{ matrix.arch }}.apk"
          done
        shell: alpine.sh --root {0}

      - uses: actions/upload-artifact@v4
        if: matrix.arch == 'x86_64'
        with:
          name: APKBUILD
          path: ${{ steps.alpine.outputs.root-path }}/packages/APKBUILD

      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: ${{ steps.alpine.outputs.root-path }}/packages/fastboop/${{ matrix.arch }}/*.apk
