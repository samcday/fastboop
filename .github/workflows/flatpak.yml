name: flatpak
on:
  workflow_dispatch: {}
  workflow_call:
    inputs:
      release_mode:
        description: Release mode from orchestrator
        required: false
        type: string
        default: none
  pull_request:
    types: [opened, synchronize, reopened, labeled]
jobs:
  flatpak:
    if: inputs.release_mode == 'pr' || inputs.release_mode == 'tag' || github.event_name != 'pull_request' || (contains(github.event.pull_request.labels.*.name, 'flatpak') && !startsWith(github.event.pull_request.head.ref || '', 'release/v'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    steps:
      - uses: actions/checkout@v6
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: fastboop-desktop.flatpak
          manifest-path: flatpak/win.fastboop.fastboop.yml
          arch: ${{ matrix.arch }}
