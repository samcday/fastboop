name: flatpak
on:
  workflow_dispatch: {}
  workflow_call: {}
jobs:
  flatpak:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    steps:
      - uses: actions/checkout@v6
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: fastboop-${{ matrix.arch }}.flatpak
          manifest-path: flatpak/win.fastboop.fastboop.yml
          arch: ${{ matrix.arch }}
