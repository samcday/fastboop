# cross build toolchain required for building aarch64 stage0 binary on x86_64 hosts
#
# there was an extension: org.freedesktop.Sdk.Extension.toolchain-aarch64
# it was x86_64 only and 'only-arches' property does not works for extensions
# including that extension in the manifest breaks build for aarch64
#
# since 25.05 both following extension was removed for unclear reasons:
# - org.freedesktop.Sdk.Compat.aarch64 and
# - org.freedesktop.Sdk.Extension.toolchain-aarch64
#
# https://gitlab.com/freedesktop-sdk/freedesktop-sdk/-/commit/1437fab
# https://gitlab.com/freedesktop-sdk/freedesktop-sdk/-/commit/4c0ef13

name: crossbuild
only-arches:
  - x86_64
buildsystem: simple
sources:
  - type: archive
    url: https://download.fedoraproject.org/pub/fedora/linux/releases/43/Everything/x86_64/os/Packages/b/binutils-aarch64-linux-gnu-2.45-1.fc43.x86_64.rpm
    sha256: ada6dfaf5169aeee6afd80d138169f2f53293b6104d4d132e438cef55ca01589
    dest: binutils-aarch64-linux-gnu
  - type: archive
    url: https://download.fedoraproject.org/pub/fedora/linux/releases/43/Everything/x86_64/os/Packages/g/gcc-aarch64-linux-gnu-15.2.1-1.fc43.x86_64.rpm
    sha256: 6496695ab47fb166e07b15c4d200edd6a735d1c93d7b24bfdd3d6c5ce3ecac87
    dest: gcc-aarch64-linux-gnu
  - type: archive
    url: https://download.fedoraproject.org/pub/fedora/linux/releases/43/Everything/x86_64/os/Packages/c/cross-gcc-common-15.2.1-1.fc43.noarch.rpm
    sha256: 83285f13f9a391ba661fa31875e05f6d42382fada1d564ba43d804390c6350b1
    dest: cross-gcc-common
  - type: archive
    url: https://download.fedoraproject.org/pub/fedora/linux/releases/43/Everything/aarch64/os/Packages/g/glibc-devel-2.42-4.fc43.aarch64.rpm
    sha256: 9fa1e701a22922eb3fa0ad7cce919dd9e8fb3feb013a68ccafd2e5a8eb79500a
    dest: glibc-devel-aarch64
  - type: archive
    url: https://download.fedoraproject.org/pub/fedora/linux/releases/43/Everything/aarch64/os/Packages/g/glibc-static-2.42-4.fc43.aarch64.rpm
    sha256: 1bbba046265f40f37ac49808266763540888907b500a35565f502ec8d79c0b09
    dest: glibc-static-aarch64
  - type: archive
    url: https://download.fedoraproject.org/pub/fedora/linux/releases/43/Everything/aarch64/os/Packages/g/gcc-15.2.1-2.fc43.aarch64.rpm
    sha256: eb928ca3492bf9b837152842313389a0e77702516a3fad2ccaace8e3b29109c5
    dest: gcc-aarch64-runtime
  - type: archive
    url: https://static.rust-lang.org/dist/rust-std-1.95.0-aarch64-unknown-linux-gnu.tar.xz
    sha256: 3a21b271b1ff973b94d69b25e7a39992f9fbcae1ab6d9475844a23e6ad3908ac
    dest: rust
build-commands:
  - mkdir -p /app/crossbuild/rust
  - mkdir -p /app/usr/lib/
  - mkdir -p /app/usr/lib64
  - cp -a binutils-aarch64-linux-gnu/bin/ gcc-aarch64-linux-gnu/bin/ /app/crossbuild/
  - cp -a binutils-aarch64-linux-gnu/lib/ gcc-aarch64-linux-gnu/lib/ /app/crossbuild/
  - cp -a gcc-aarch64-linux-gnu/libexec/ /app/crossbuild/
  - cp -a binutils-aarch64-linux-gnu/aarch64-linux-gnu/ gcc-aarch64-linux-gnu/aarch64-linux-gnu/ /app/crossbuild/
  - ln -sfn /app/lib/aarch64-linux-gnu /app/usr/lib/aarch64-linux-gnu
  - ln -sfn /app/lib/aarch64-linux-gnu/ld-linux-aarch64.so.1 /app/lib/ld-linux-aarch64.so.1
  - cp -a glibc-devel-aarch64/lib64/*.a glibc-devel-aarch64/lib64/*.o glibc-static-aarch64/lib64/*.a /app/crossbuild/lib/gcc/aarch64-linux-gnu/15/
  - cp -a glibc-devel-aarch64/lib64/*.a glibc-devel-aarch64/lib64/*.o glibc-static-aarch64/lib64/*.a /app/usr/lib64/
  - cp -a gcc-aarch64-runtime/lib/gcc/aarch64-redhat-linux/15/libgcc_eh.a /app/crossbuild/lib/gcc/aarch64-linux-gnu/15/
  - cp -a /usr/lib/sdk/rust-stable/. /app/crossbuild/rust/
  - sh rust/install.sh --prefix=/app/crossbuild/rust/ --disable-ldconfig
