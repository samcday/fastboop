# cross build toolchain required for building aarch64 stage0 binary on x86_64 hosts
#
# there was an extension: org.freedesktop.Sdk.Extension.toolchain-aarch64
# it was x86_64 only and 'only-arches' property does not works for extensions
# including that extension in the manifest breaks build for aarch64
#
# since 25.05 both following extension was removed for unclear reasons:
# - org.freedesktop.Sdk.Compat.aarch64
# - org.freedesktop.Sdk.Extension.toolchain-aarch64
#
# https://gitlab.com/freedesktop-sdk/freedesktop-sdk/-/commit/1437fab
# https://gitlab.com/freedesktop-sdk/freedesktop-sdk/-/commit/4c0ef13

name: crossbuild
only-arches:
  - x86_64
buildsystem: simple
sources:
  - type: archive
    url: https://kojipkgs.fedoraproject.org/packages/cross-binutils/2.46/1.fc44/x86_64/binutils-aarch64-linux-gnu-2.46-1.fc44.x86_64.rpm
    sha256: 6dc9dc84e5e310362701e051cb261df2141704000aa37993da0b91b03aa9ca74
    dest: binutils-aarch64-linux-gnu
    x-checker-data:
      type: json
      url: https://mdapi.fedoraproject.org/f44/pkg/binutils-aarch64-linux-gnu
      version-query: '"\(.version)-\(.release)"'
      url-query: '"https://kojipkgs.fedoraproject.org/packages/cross-binutils/\(.version)/\(.release)/\(.arch)/\(.basename)-\(.version)-\(.release).\(.arch).rpm"'
  - type: archive
    url: https://kojipkgs.fedoraproject.org/packages/cross-gcc/15.2.1/1.fc44/x86_64/gcc-aarch64-linux-gnu-15.2.1-1.fc44.x86_64.rpm
    sha256: 22855fc70b00fbb45628cf8b6fea6f4f5d7fc98c2f733a9d4d0c28ecf15842c0
    dest: gcc-aarch64-linux-gnu
    x-checker-data:
      type: json
      url: https://mdapi.fedoraproject.org/f44/pkg/gcc-aarch64-linux-gnu
      version-query: '"\(.version)-\(.release)"'
      url-query: '"https://kojipkgs.fedoraproject.org/packages/cross-gcc/\(.version)/\(.release)/\(.arch)/\(.basename)-\(.version)-\(.release).\(.arch).rpm"'
  - type: archive
    url: https://kojipkgs.fedoraproject.org/packages/cross-gcc/15.2.1/1.fc44/noarch/cross-gcc-common-15.2.1-1.fc44.noarch.rpm
    sha256: d0ebde09381a5bc183e56f1ed5fe11d6a063fb8036d59ea45ed291e3dbe5c474
    dest: cross-gcc-common
    x-checker-data:
      type: json
      url: https://mdapi.fedoraproject.org/f44/pkg/cross-gcc-common
      version-query: '"\(.version)-\(.release)"'
      url-query: '"https://kojipkgs.fedoraproject.org/packages/cross-gcc/\(.version)/\(.release)/\(.arch)/\(.basename)-\(.version)-\(.release).\(.arch).rpm"'
  - type: archive
    url: https://static.rust-lang.org/dist/2026-04-16/rust-std-1.95.0-aarch64-unknown-linux-gnu.tar.xz
    sha256: 3a21b271b1ff973b94d69b25e7a39992f9fbcae1ab6d9475844a23e6ad3908ac
    dest: rust
    x-checker-data:
      type: rust
      package: rust-std
      channel: stable
      target: aarch64-unknown-linux-gnu
build-commands:
  - mkdir -p /app/crossbuild/rust
  - mkdir -p /app/usr/lib/
  - cp -a */bin/ /app/crossbuild/
  - cp -a */lib/ /app/crossbuild/
  - cp -a */libexec/ /app/crossbuild/
  - ln -sfn /app/lib/aarch64-linux-gnu /app/usr/lib/aarch64-linux-gnu
  - ln -sfn /app/lib/aarch64-linux-gnu/ld-linux-aarch64.so.1 /app/lib/ld-linux-aarch64.so.1
  - cp -a /app/lib/sdk/rust-stable/. /app/crossbuild/rust/
  - sh rust/install.sh --prefix=/app/crossbuild/rust/ --disable-ldconfig
