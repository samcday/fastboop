# stage0 is always aarch64 binary
# meant to be executed on the fastbooped pocket computer
# never executed on the host

name: stage0
buildsystem: simple
build-options:
  build-args:
    - --share=network
    # network shared only for development builds
    # should not be shared when manifest submitted to flathub
  prepend-path: /app/lib/sdk/rust-stable/bin:/app/lib/sdk/llvm21/bin
  env:
    CARGO_HOME: /run/build/stage0/cargo
  arch:
    x86_64:
      prepend-path: /app/crossbuild/bin:/app/lib/sdk/rust-stable/bin:/app/lib/sdk/llvm21/bin
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: /app/lib/sdk/llvm21/bin/clang
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "--sysroot=/app/crossbuild/rust -C link-arg=--target=aarch64-linux-gnu -C link-arg=--sysroot=/app -C link-arg=--gcc-toolchain=/app/crossbuild -C link-arg=-fuse-ld=lld -C link-arg=-L/app/usr/lib/aarch64-linux-gnu"
        BINDGEN_EXTRA_CLANG_ARGS: -I/usr/include/x86_64-linux-gnu
    aarch64:
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: gcc
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "--sysroot=/app/lib/sdk/rust-stable"
        BINDGEN_EXTRA_CLANG_ARGS: -I/usr/include/aarch64-linux-gnu
sources:
  - type: dir
    path: ../..
build-commands:
  - cargo build --locked --release --target aarch64-unknown-linux-gnu -p fastboop-stage0
  - install -Dm755 target/aarch64-unknown-linux-gnu/release/fastboop-stage0 /app/libexec/stage0
