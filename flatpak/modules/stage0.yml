# stage0 is always aarch64 binary
# meant to be executed on the fastbooped pocket computer
# never executed on the host

name: stage0
buildsystem: simple
build-options:
  build-args:
    - --share=network
    # network shared only for development builds
    # should not be shared when manifest submitted to flathub
  prepend-path: /app/lib/sdk/rust-stable/bin:/app/lib/sdk/llvm21/bin
  env:
    CARGO_HOME: /run/build/stage0/cargo
    CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: rust-lld
    CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS: "-C target-feature=+crt-static --sysroot=/run/build/stage0/rust-sysroot"
  arch:
    x86_64:
      env:
        BINDGEN_EXTRA_CLANG_ARGS: -I/usr/include/x86_64-linux-gnu
    aarch64:
      env:
        BINDGEN_EXTRA_CLANG_ARGS: -I/usr/include/aarch64-linux-gnu
sources:
  - type: archive
    url: https://static.rust-lang.org/dist/2026-04-16/rust-std-1.95.0-aarch64-unknown-linux-musl.tar.xz
    sha256: f6710416ed9a7d5cf2a15efa761eb79a1deeb43f9961bbe05cc97bec4ef9064a
    dest: rust-std
    x-checker-data:
      type: rust
      package: rust-std
      channel: stable
      target: aarch64-unknown-linux-musl
  - type: dir
    path: ../..
build-commands:
  - mkdir -p /run/build/stage0/rust-sysroot
  - cp -a /app/lib/sdk/rust-stable/. /run/build/stage0/rust-sysroot/
  - sh rust-std/install.sh --prefix=/run/build/stage0/rust-sysroot --disable-ldconfig
  - cargo build --locked --release --target aarch64-unknown-linux-musl -p fastboop-stage0
  - install -Dm755 target/aarch64-unknown-linux-musl/release/fastboop-stage0 /app/lib/fastboop/stage0/stage0-aarch64
  - sh -c 'llvm-readelf -l /app/lib/fastboop/stage0/stage0-aarch64 > /tmp/fastboop-stage0-headers && ! grep -q INTERP /tmp/fastboop-stage0-headers'
